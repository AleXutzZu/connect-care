syntax = "proto3";

package teledon_management;

option java_multiple_files = false;
option java_package = "me.alexutzzu.teledon.protos";
option java_outer_classname = "DonationProtos";
option csharp_namespace = "teledon_management_ui.Protos";

import "response_status.proto";
import "charity.proto";
import "donor.proto";

message Donation {
  optional int64 id = 1;
  optional Charity charity = 2;
  optional DonorDto donor = 3;
  optional double amount = 4;
}

message CreateDonationRequestBody {
  optional int64 charityId = 1;
  optional int64 donorId = 2;
  optional double amount = 3;
}

message DonationRequest {
  oneof body {
    CreateDonationRequestBody createBody = 1;
  }
}

message CreateDonationResponseBody {
  optional Donation donation = 1;
}

message DonationResponse {
  optional ResponseStatus status = 1;
  oneof body {
    CreateDonationResponseBody createBody = 2;
  }
}