syntax = "proto3";

package teledon_management;

option java_multiple_files = false;
option java_package = "me.alexutzzu.teledon.protos";
option java_outer_classname = "MainMessageProtos";
option csharp_namespace = "teledon_management_ui.Protos";

import "charity.proto";
import "auth_user.proto";
import "donor.proto";
import "donation.proto";

message MainMessage {
  optional bool isUpdatePayload = 1;

  oneof payload {
    AuthUserRequest authReq = 2;
    AuthUserResponse authRes = 3;
    CharityDtoRequest charityReq = 4;
    CharityDtoResponse charityRes = 5;
    DonorDtoRequest donorReq = 6;
    DonorDtoResponse donorRes = 7;
    DonationRequest donationReq = 8;
    DonationResponse donationRes = 9;
  }
}